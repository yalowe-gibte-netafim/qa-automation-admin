name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    outputs:
      test_exit_code: ${{ steps.run_tests.outputs.exit_code }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install --with-deps chromium

      - name: Clean Allure folders
        run: |
          rm -rf allure-results allure-report allure-history gh-pages
          mkdir -p allure-results

      - name: Run tests
        id: run_tests
        env:
          TEST_USERNAME: ${{ secrets.TEST_USERNAME }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          CI: true
        run: |
          set +e
          pytest --alluredir=allure-results
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "$EXIT_CODE" > test-exit-code.txt
          exit 0

      - name: Create Allure environment info
        if: always()
        run: |
          mkdir -p allure-results
          echo "Environment=QA" > allure-results/environment.properties
          echo "Framework=Admin Portal Automation" >> allure-results/environment.properties
          echo "Browser=Chromium" >> allure-results/environment.properties
          echo "Execution=GitHub Actions" >> allure-results/environment.properties
          echo "Python=3.12" >> allure-results/environment.properties

      - name: Load previous Allure history
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_report: allure-report
          gh_pages: gh-pages
          allure_history: allure-history
          keep_reports: 20

      - name: Upload Allure results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report

      - name: Upload Allure history artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-history
          path: allure-history

      - name: Upload test exit code
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-exit-code
          path: test-exit-code.txt

      - name: Publish Allure Report to GitHub Pages
        if: always() && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

  final-status:
    if: always()
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Fail workflow if tests failed
        run: |
          echo "Test exit code: ${{ needs.test.outputs.test_exit_code }}"
          if [ "${{ needs.test.outputs.test_exit_code }}" != "0" ]; then
            echo "Tests failed. Allure report was still generated."
            exit 1
          fi
          echo "Tests passed successfully."